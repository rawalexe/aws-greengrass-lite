name: UAT Component Tests

on:
  push:
    branches:
      - main
      - "release/*"
  pull_request:
  workflow_dispatch:
    inputs:
      testing_repo:
        description: "Testing repository to use as source of tests"
        required: false
      testing_repo_ref:
        description: "Ref (branch) on the testing repo to use"
        required: false

# Serialize UAT runs so multiple PRs/merges don't hammer the shared AWS
# account concurrently and trip IoT Core / IoT
# Jobs API rate quotas. Only one UAT run executes at a time; newer runs queue.
# cancel-in-progress: false => let the in-flight run finish (don't lose coverage).
concurrency:
  group: uat-component-tests
  cancel-in-progress: false

jobs:
  list-tests:
    if:
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name ==
      'aws-greengrass/aws-greengrass-lite'
    runs-on: ubuntu-24.04
    outputs:
      tests: ${{ steps.list.outputs.tests }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout testing repository
        uses: actions/checkout@v6
        with:
          repository:
            ${{ github.event.inputs.testing_repo ||
            'aws-greengrass/aws-greengrass-testing' }}
          ref: ${{ github.event.inputs.testing_repo_ref || 'main' }}
          path: aws-greengrass-testing

      - name: List all tests
        id: list
        run: |
          cd aws-greengrass-testing
          IGNORE_FILE="${GITHUB_WORKSPACE}/.github/uat-ignore.txt"
          tests=$(find src -name "aws-greengrass-testing-*.py" -exec grep -l "^def test_" {} \; | \
            while read file; do
              category=$(basename "$file" | sed 's/aws-greengrass-testing-\(.*\)\.py/\1/')
              grep -h "^def test_" "$file" | sed 's/def \(test_[^(]*\).*/\1/' | \
              while read test; do
                if [ ! -f "$IGNORE_FILE" ] || ! grep -v '^#' "$IGNORE_FILE" | grep -qE "^($category:)?$test"; then
                  echo "{\"name\":\"$test\",\"category\":\"$category\",\"timeout\":3900}"
                fi
              done
            done | jq -s -c .)
          echo "tests=$tests" >> $GITHUB_OUTPUT

  uat-test:
    if:
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name ==
      'aws-greengrass/aws-greengrass-lite'
    needs: list-tests
    strategy:
      fail-fast: false
      # Cap how many test jobs hit the shared AWS account at once within a
      # single run. Combined with the run-level `concurrency` lane above, the
      # account never sees more than this many UAT jobs concurrently. Tune up
      # if throttling stays clear; tune down if ThrottlingExceptions persist.
      max-parallel: 4
      matrix:
        test: ${{ fromJson(needs.list-tests.outputs.tests) }}
    permissions:
      id-token: write
      contents: read

    runs-on: ubuntu-24.04

    steps:
      # Spread initial API load across the shared account so parallel matrix
      # jobs don't all hit AWS simultaneously and trigger synchronized throttling.
      - name: Stagger start to decorrelate parallel AWS API bursts
        run: sleep $(( RANDOM % 30 ))
        shell: bash

      - name: Checkout lite repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ">=3.12"

      - name: Checkout testing repository
        uses: actions/checkout@v6
        with:
          repository:
            ${{ github.event.inputs.testing_repo ||
            'aws-greengrass/aws-greengrass-testing' }}
          ref: ${{ github.event.inputs.testing_repo_ref || 'main' }}
          path: aws-greengrass-testing

      - name: Get temporary AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          audience: sts.amazonaws.com
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::832850273037:role/GGL-UAT-GH-Role
          role-duration-seconds: ${{ matrix.test.timeout }}
          unset-current-credentials: true

      - name: Set sanitized SHA to github env
        env:
          PR_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          SANITIZED_SHA=$(echo "$PR_SHA" | tr -cd 'a-fA-F0-9')
          echo "SHA=$SANITIZED_SHA" >> $GITHUB_ENV

      - name: Run UAT test
        run: |
          cd aws-greengrass-testing
          ./run-tests.sh \
            --aws-account=832850273037 \
            --s3-bucket=lite-uat-bucket \
            --commit-id=${{ env.SHA }} \
            --aws-region=us-west-2 \
            --test-category=${{ matrix.test.category }} \
            --test-name=${{ matrix.test.name }}
